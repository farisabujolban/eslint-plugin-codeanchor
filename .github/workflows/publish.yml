name: Publish

on:
    push:
        tags:
            - 'v*'

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            id-token: write

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v7
              with:
                  node-version: 24
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - run: npm ci

            - run: npm test

            - run: npm publish --access public
